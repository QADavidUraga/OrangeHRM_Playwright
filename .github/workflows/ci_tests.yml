name: CI • Tests
on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
  pull_request:

jobs:
  tests-playwright:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (JUnit + HTML)
        run: npm test
        env:
          TZ: America/Mexico_City

      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: reports/*.xml
          if-no-files-found: warn

      - name: Upload Playwright report & traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/**
            test-results/**
          if-no-files-found: ignore

      - name: Publish JUnit to PR Checks
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright Tests
          path: "reports/*.xml"
          reporter: java-junit
          fail-on-error: false
